<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Kannu 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --rose:#e8517a;
  --rose-dark:#c2304f;
  --rose-light:#f9c3d2;
  --petal-deep:#d63c6b;
  --petal-mid:#ef7fa0;
  --petal-light:#fbd0e0;
  --petal-white:#fff5f8;
  --gold:#d4a843;
  --leaf:#3a7c4e;
  --leaf-dark:#275638;
  --stem:#2c5f3a;
  --bg1:#1a0510;
  --bg2:#2d0a1b;
  --bg3:#150310;
  --text-main:#fff0f5;
  --text-soft:#f8c4d5;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:radial-gradient(ellipse at 20% 80%, #2d0a1b 0%, #1a0510 40%, #0d020a 100%);
  font-family:'Lato',sans-serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  min-height:100vh;
}

/* Starfield */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.5);}50%{opacity:1;transform:scale(1);}}

/* Main scene */
#scene{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100vh;
  justify-content:flex-end;
  padding-bottom:0;
}

/* SVG bouquet */
#bouquet-svg{
  display:block;
  width:min(700px, 95vw);
  max-height:70vh;
  margin-bottom:-2px;
  opacity:0;
  transition:opacity 0.8s ease;
}
#bouquet-svg.visible{opacity:1;}

/* Text overlay */
#text-block{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:5vh;
  z-index:5;
  pointer-events:none;
}
.tagline{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(0.6rem,2vw,1.05rem);
  letter-spacing:0.35em;
  color:var(--rose-light);
  opacity:0;
  transform:translateY(-12px);
  transition:all 1.2s ease 0.2s;
  text-transform:uppercase;
}
.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,10vw,6.2rem);
  font-style:italic;
  font-weight:600;
  color:var(--text-main);
  line-height:1.05;
  text-align:center;
  letter-spacing:0.02em;
  opacity:0;
  transform:translateY(20px);
  transition:all 1.4s cubic-bezier(0.23,1,0.32,1) 0.5s;
  text-shadow:0 0 80px rgba(232,81,122,0.5), 0 2px 4px rgba(0,0,0,0.6);
}
.sub{
  margin-top:0.5rem;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.95rem,3vw,1.5rem);
  font-style:italic;
  font-weight:400;
  color:var(--text-soft);
  opacity:0;
  transform:translateY(10px);
  transition:all 1.2s ease 1s;
  text-align:center;
  padding:0 1rem;
}
.show{opacity:1;transform:translateY(0);}

/* Start button */
#start-btn{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  background:transparent;
  border:1.5px solid rgba(232,81,122,0.7);
  color:var(--text-main);
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(0.8rem,2.5vw,1rem);
  letter-spacing:0.2em;
  padding:1.1em 2.8em;
  border-radius:100px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  background:rgba(232,81,122,0.1);
  box-shadow:0 0 40px rgba(232,81,122,0.25), inset 0 0 30px rgba(232,81,122,0.05);
  transition:all 0.5s ease;
  animation:pulse-btn 2.5s ease infinite;
}
#start-btn:hover{
  background:rgba(232,81,122,0.25);
  box-shadow:0 0 60px rgba(232,81,122,0.5);
  border-color:rgba(232,81,122,1);
  transform:translate(-50%,-50%) scale(1.05);
  animation:none;
}
@keyframes pulse-btn{
  0%,100%{box-shadow:0 0 30px rgba(232,81,122,0.2);}
  50%{box-shadow:0 0 60px rgba(232,81,122,0.45), 0 0 100px rgba(232,81,122,0.1);}
}

/* Falling petals */
.fpetal{
  position:fixed;
  width:8px;height:12px;
  border-radius:50% 50% 40% 40%;
  opacity:0;
  pointer-events:none;
  z-index:1;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{opacity:0;transform:translateY(-20px) rotate(0deg);}
  5%{opacity:0.8;}
  95%{opacity:0.5;}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg);}
}

/* Glow ring */
#glow-ring{
  position:fixed;bottom:-200px;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  border-radius:50%;
  background:radial-gradient(ellipse at center, rgba(232,81,122,0.25) 0%, transparent 70%);
  pointer-events:none;z-index:1;
  opacity:0;transition:opacity 2s ease 1s;
}
#glow-ring.visible{opacity:1;}

/* Particle canvas */
#particle-canvas{
  position:fixed;inset:0;z-index:1;pointer-events:none;
}

/* Verse */
#verse{
  position:fixed;bottom:0;left:0;right:0;
  text-align:center;
  padding:0.7rem 1rem 1rem;
  z-index:6;
  pointer-events:none;
  opacity:0;
  transition:opacity 1.5s ease 2.5s;
}
#verse.show{opacity:1;}
#verse p{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(0.75rem,2.2vw,1rem);
  color:rgba(255,192,213,0.7);
  letter-spacing:0.04em;
}

/* Heart particles for canvas — handled in JS */
</style>
</head>
<body>

<div id="stars"></div>
<canvas id="particle-canvas"></canvas>
<div id="glow-ring"></div>

<button id="start-btn" onclick="beginMagic()">Tap to open ✦</button>

<div id="scene">
  <svg id="bouquet-svg" viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Petal gradients -->
      <radialGradient id="pg-center" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#fff0f5"/>
        <stop offset="40%" stop-color="#f093ab"/>
        <stop offset="100%" stop-color="#c2304f"/>
      </radialGradient>
      <radialGradient id="pg-left" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#fff5fb"/>
        <stop offset="40%" stop-color="#f5b8cc"/>
        <stop offset="100%" stop-color="#d63c6b"/>
      </radialGradient>
      <radialGradient id="pg-right" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#fff0f8"/>
        <stop offset="40%" stop-color="#f4a3bf"/>
        <stop offset="100%" stop-color="#bf2e5e"/>
      </radialGradient>
      <radialGradient id="pg-small1" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#fff8fb"/>
        <stop offset="40%" stop-color="#fcd5e2"/>
        <stop offset="100%" stop-color="#e8517a"/>
      </radialGradient>
      <radialGradient id="pg-small2" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#fff5fa"/>
        <stop offset="40%" stop-color="#fac8d9"/>
        <stop offset="100%" stop-color="#d44470"/>
      </radialGradient>
      <!-- Leaf gradient -->
      <linearGradient id="leaf-g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4a9e62"/>
        <stop offset="100%" stop-color="#275638"/>
      </linearGradient>
      <linearGradient id="leaf-g2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3a7c4e"/>
        <stop offset="100%" stop-color="#1e4a2e"/>
      </linearGradient>
      <!-- Stem gradient -->
      <linearGradient id="stem-g" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1e4a2e"/>
        <stop offset="50%" stop-color="#3a7c4e"/>
        <stop offset="100%" stop-color="#1e4a2e"/>
      </linearGradient>
      <!-- Wrap gradient -->
      <linearGradient id="wrap-g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8b2252"/>
        <stop offset="50%" stop-color="#b83060"/>
        <stop offset="100%" stop-color="#7a1b45"/>
      </linearGradient>
      <linearGradient id="wrap-shine" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(255,255,255,0)" />
        <stop offset="30%" stop-color="rgba(255,255,255,0.18)" />
        <stop offset="100%" stop-color="rgba(255,255,255,0)" />
      </linearGradient>
      <!-- Center stamen gradient -->
      <radialGradient id="stamen-g" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#fff176"/>
        <stop offset="50%" stop-color="#fdd835"/>
        <stop offset="100%" stop-color="#f9a825"/>
      </radialGradient>
      <!-- Ribbon -->
      <linearGradient id="ribbon-g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c2304f"/>
        <stop offset="100%" stop-color="#8b1a35"/>
      </linearGradient>
      <!-- Wrap lace pattern -->
      <pattern id="lace" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
        <circle cx="6" cy="6" r="2" fill="rgba(255,255,255,0.08)"/>
      </pattern>
    </defs>

    <!-- ===== WRAPPER / CONE ===== -->
    <g id="wrap-group" style="opacity:0">
      <!-- Main cone -->
      <polygon points="350,620 230,350 470,350" fill="url(#wrap-g)"/>
      <!-- Lace overlay -->
      <polygon points="350,620 230,350 470,350" fill="url(#lace)"/>
      <!-- Shine crease left -->
      <polygon points="350,620 230,350 290,350" fill="rgba(255,255,255,0.06)"/>
      <!-- Shine crease right -->
      <line x1="310" y1="380" x2="350" y2="620" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
      <!-- Top ruffle fold -->
      <path d="M230,350 Q260,340 290,355 Q310,365 330,350 Q350,335 370,350 Q390,365 410,355 Q440,340 470,350" 
            fill="none" stroke="#a0254a" stroke-width="2.5"/>
      <path d="M230,350 Q260,340 290,355 Q310,365 330,350 Q350,335 370,350 Q390,365 410,355 Q440,340 470,350" 
            fill="rgba(255,255,255,0.07)"/>
      <!-- Ribbon -->
      <rect x="330" y="345" width="40" height="280" rx="4" fill="url(#ribbon-g)" opacity="0.5"/>
      <!-- Ribbon knot -->
      <ellipse cx="350" cy="380" rx="28" ry="14" fill="#b83060"/>
      <ellipse cx="350" cy="380" rx="14" ry="8" fill="#d44470"/>
      <!-- Ribbon left bow -->
      <path d="M350,380 Q300,350 295,375 Q290,398 350,385" fill="#b83060"/>
      <!-- Ribbon right bow -->
      <path d="M350,380 Q400,350 405,375 Q410,398 350,385" fill="#b83060"/>
      <!-- Ribbon tails -->
      <path d="M340,386 Q320,440 310,490" stroke="#b83060" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M360,386 Q380,440 390,490" stroke="#922649" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ===== STEMS ===== -->
    <g id="stems" style="opacity:0">
      <!-- Back stems -->
      <line x1="350" y1="580" x2="350" y2="220" stroke="url(#stem-g)" stroke-width="9" stroke-linecap="round"/>
      <line x1="350" y1="560" x2="280" y2="250" stroke="url(#stem-g)" stroke-width="7" stroke-linecap="round"/>
      <line x1="350" y1="560" x2="420" y2="255" stroke="url(#stem-g)" stroke-width="7" stroke-linecap="round"/>
      <line x1="350" y1="540" x2="210" y2="310" stroke="url(#stem-g)" stroke-width="6" stroke-linecap="round"/>
      <line x1="350" y1="540" x2="490" y2="310" stroke="url(#stem-g)" stroke-width="6" stroke-linecap="round"/>

      <!-- Leaves on center stem -->
      <g transform="translate(320,310) rotate(-35)">
        <ellipse rx="32" ry="12" fill="url(#leaf-g)"/>
        <line x1="-28" y1="0" x2="28" y2="0" stroke="#1e4a2e" stroke-width="1.2"/>
      </g>
      <g transform="translate(382,295) rotate(40)">
        <ellipse rx="28" ry="11" fill="url(#leaf-g2)"/>
        <line x1="-24" y1="0" x2="24" y2="0" stroke="#1e4a2e" stroke-width="1.2"/>
      </g>
      <!-- Leaves on left stem -->
      <g transform="translate(268,320) rotate(-50)">
        <ellipse rx="26" ry="10" fill="url(#leaf-g)"/>
      </g>
      <!-- Leaves on right stem -->
      <g transform="translate(435,325) rotate(55)">
        <ellipse rx="24" ry="9" fill="url(#leaf-g2)"/>
      </g>
      <!-- Small baby leaves -->
      <g transform="translate(240,355) rotate(-60)">
        <ellipse rx="18" ry="7" fill="url(#leaf-g)" opacity="0.8"/>
      </g>
      <g transform="translate(462,360) rotate(65)">
        <ellipse rx="16" ry="7" fill="url(#leaf-g2)" opacity="0.8"/>
      </g>
    </g>

    <!-- ===== ROSES ===== -->

    <!-- === FAR LEFT SMALL BUD === -->
    <g id="fl-far-left" transform="translate(205,310)" style="opacity:0;transform-origin:205px 400px">
      <!-- Sepals -->
      <g transform="translate(0,0)">
        <path d="M0,40 Q-18,20 -15,0 Q0,15 0,40" fill="#2c5f3a" opacity="0.9"/>
        <path d="M0,40 Q18,20 15,0 Q0,15 0,40" fill="#3a7c4e" opacity="0.9"/>
      </g>
      <!-- Petals layer 3 -->
      <g style="transform-origin:0px 10px">
        <path d="M0,40 Q-40,-10 -20,-50 Q0,-30 0,40" fill="#d63c6b" opacity="0.85"/>
        <path d="M0,40 Q40,-10 20,-50 Q0,-30 0,40" fill="#c2304f" opacity="0.85"/>
      </g>
      <!-- Petals layer 2 -->
      <path d="M0,35 Q-32,-5 -18,-42 Q2,-25 0,35" fill="#e8517a" opacity="0.9"/>
      <path d="M0,35 Q32,-5 18,-42 Q-2,-25 0,35" fill="#d84470" opacity="0.9"/>
      <!-- Petals layer 1 (front) -->
      <path d="M0,30 Q-22,0 -12,-34 Q2,-20 0,30" fill="#f07a98"/>
      <path d="M0,30 Q22,0 12,-34 Q-2,-20 0,30" fill="#ef6d8c"/>
      <!-- Center -->
      <circle cx="0" cy="-10" r="8" fill="url(#stamen-g)"/>
      <circle cx="0" cy="-10" r="4" fill="#fff176"/>
    </g>

    <!-- === FAR RIGHT SMALL BUD === -->
    <g id="fl-far-right" transform="translate(495,315)" style="opacity:0;transform-origin:495px 400px">
      <g>
        <path d="M0,40 Q-18,20 -15,0 Q0,15 0,40" fill="#2c5f3a" opacity="0.9"/>
        <path d="M0,40 Q18,20 15,0 Q0,15 0,40" fill="#3a7c4e" opacity="0.9"/>
      </g>
      <path d="M0,40 Q-40,-10 -20,-50 Q0,-30 0,40" fill="#bf2e5e" opacity="0.85"/>
      <path d="M0,40 Q40,-10 20,-50 Q0,-30 0,40" fill="#c2304f" opacity="0.85"/>
      <path d="M0,35 Q-32,-5 -18,-42 Q2,-25 0,35" fill="#e0456e" opacity="0.9"/>
      <path d="M0,35 Q32,-5 18,-42 Q-2,-25 0,35" fill="#d84470" opacity="0.9"/>
      <path d="M0,30 Q-22,0 -12,-34 Q2,-20 0,30" fill="#ee7898"/>
      <path d="M0,30 Q22,0 12,-34 Q-2,-20 0,30" fill="#e86a8c"/>
      <circle cx="0" cy="-10" r="8" fill="url(#stamen-g)"/>
      <circle cx="0" cy="-10" r="4" fill="#fff176"/>
    </g>

    <!-- === LEFT MEDIUM ROSE === -->
    <g id="fl-left" transform="translate(278,250)" style="opacity:0;transform-origin:278px 400px">
      <!-- Sepals -->
      <path d="M0,55 Q-25,30 -22,0 Q0,20 0,55" fill="#2c5f3a"/>
      <path d="M0,55 Q25,30 22,0 Q0,20 0,55" fill="#3a7c4e"/>
      <path d="M0,55 Q-12,20 0,-5 Q12,20 0,55" fill="#275638"/>
      <!-- Outer petals - layer 4 -->
      <path d="M0,50 Q-65,-5 -45,-75 Q-15,-40 0,50" fill="#bf2e5e" opacity="0.8"/>
      <path d="M0,50 Q65,-5 45,-75 Q15,-40 0,50" fill="#b82b5a" opacity="0.8"/>
      <path d="M0,50 Q-5,-65 -55,-75 Q-30,-35 0,50" fill="#c93463" opacity="0.82"/>
      <path d="M0,50 Q5,-65 55,-75 Q30,-35 0,50" fill="#bd2d5d" opacity="0.82"/>
      <!-- Layer 3 -->
      <path d="M0,45 Q-55,0 -40,-65 Q-12,-32 0,45" fill="#d63c6b" opacity="0.88"/>
      <path d="M0,45 Q55,0 40,-65 Q12,-32 0,45" fill="#d03968" opacity="0.88"/>
      <path d="M0,45 Q5,-58 -45,-68 Q-25,-30 0,45" fill="#da4070" opacity="0.9"/>
      <path d="M0,45 Q-5,-58 45,-68 Q25,-30 0,45" fill="#d43a6c" opacity="0.9"/>
      <!-- Layer 2 -->
      <path d="M0,40 Q-42,5 -32,-52 Q-8,-25 0,40" fill="#e8517a" opacity="0.92"/>
      <path d="M0,40 Q42,5 32,-52 Q8,-25 0,40" fill="#e24d76" opacity="0.92"/>
      <path d="M0,40 Q2,-50 -38,-58 Q-18,-25 0,40" fill="#ed5880" opacity="0.94"/>
      <path d="M0,40 Q-2,-50 38,-58 Q18,-25 0,40" fill="#e8527c" opacity="0.94"/>
      <!-- Layer 1 - innermost -->
      <path d="M0,35 Q-28,8 -22,-40 Q-4,-18 0,35" fill="#f07898"/>
      <path d="M0,35 Q28,8 22,-40 Q4,-18 0,35" fill="#ee7294"/>
      <path d="M0,30 Q-2,-35 -20,-40 Q-10,-18 0,30" fill="#f8aabb"/>
      <path d="M0,30 Q2,-35 20,-40 Q10,-18 0,30" fill="#f5a4b6"/>
      <!-- Stamen -->
      <ellipse cx="0" cy="-15" rx="15" ry="10" fill="url(#stamen-g)"/>
      <circle cx="-6" cy="-17" r="3" fill="#fff176"/>
      <circle cx="6" cy="-17" r="3" fill="#fdd835"/>
      <circle cx="0" cy="-20" r="3" fill="#fff9c4"/>
      <circle cx="0" cy="-12" r="6" fill="url(#stamen-g)" opacity="0.7"/>
    </g>

    <!-- === RIGHT MEDIUM ROSE === -->
    <g id="fl-right" transform="translate(422,255)" style="opacity:0;transform-origin:422px 400px">
      <path d="M0,55 Q-25,30 -22,0 Q0,20 0,55" fill="#2c5f3a"/>
      <path d="M0,55 Q25,30 22,0 Q0,20 0,55" fill="#3a7c4e"/>
      <path d="M0,55 Q-12,20 0,-5 Q12,20 0,55" fill="#275638"/>
      <!-- Outer - layer 4 -->
      <path d="M0,50 Q-65,-5 -45,-75 Q-15,-40 0,50" fill="#b82b5a" opacity="0.8"/>
      <path d="M0,50 Q65,-5 45,-75 Q15,-40 0,50" fill="#c02f5e" opacity="0.8"/>
      <path d="M0,50 Q-5,-65 -55,-75 Q-30,-35 0,50" fill="#bd2d5c" opacity="0.82"/>
      <path d="M0,50 Q5,-65 55,-75 Q30,-35 0,50" fill="#c53361" opacity="0.82"/>
      <!-- Layer 3 -->
      <path d="M0,45 Q-55,0 -40,-65 Q-12,-32 0,45" fill="#d23668" opacity="0.88"/>
      <path d="M0,45 Q55,0 40,-65 Q12,-32 0,45" fill="#ce3366" opacity="0.88"/>
      <path d="M0,45 Q5,-58 -45,-68 Q-25,-30 0,45" fill="#d83a6e" opacity="0.9"/>
      <path d="M0,45 Q-5,-58 45,-68 Q25,-30 0,45" fill="#d23668" opacity="0.9"/>
      <!-- Layer 2 -->
      <path d="M0,40 Q-42,5 -32,-52 Q-8,-25 0,40" fill="#e44e78" opacity="0.92"/>
      <path d="M0,40 Q42,5 32,-52 Q8,-25 0,40" fill="#e04a74" opacity="0.92"/>
      <path d="M0,40 Q2,-50 -38,-58 Q-18,-25 0,40" fill="#ea5480" opacity="0.94"/>
      <path d="M0,40 Q-2,-50 38,-58 Q18,-25 0,40" fill="#e64e7a" opacity="0.94"/>
      <!-- Layer 1 -->
      <path d="M0,35 Q-28,8 -22,-40 Q-4,-18 0,35" fill="#ee7494"/>
      <path d="M0,35 Q28,8 22,-40 Q4,-18 0,35" fill="#ec7090"/>
      <path d="M0,30 Q-2,-35 -20,-40 Q-10,-18 0,30" fill="#f6a2b4"/>
      <path d="M0,30 Q2,-35 20,-40 Q10,-18 0,30" fill="#f39eb0"/>
      <!-- Stamen -->
      <ellipse cx="0" cy="-15" rx="15" ry="10" fill="url(#stamen-g)"/>
      <circle cx="-6" cy="-17" r="3" fill="#fff176"/>
      <circle cx="6" cy="-17" r="3" fill="#fdd835"/>
      <circle cx="0" cy="-20" r="3" fill="#fff9c4"/>
      <circle cx="0" cy="-12" r="6" fill="url(#stamen-g)" opacity="0.7"/>
    </g>

    <!-- === CENTER LARGE QUEEN ROSE === -->
    <g id="fl-center" transform="translate(350,190)" style="opacity:0;transform-origin:350px 400px">
      <!-- Sepals -->
      <path d="M0,65 Q-30,35 -28,0 Q0,25 0,65" fill="#2c5f3a"/>
      <path d="M0,65 Q30,35 28,0 Q0,25 0,65" fill="#3a7c4e"/>
      <path d="M0,65 Q-15,25 0,-5 Q15,25 0,65" fill="#275638"/>
      <path d="M0,65 Q-30,10 -10,-10 Q0,25 0,65" fill="#1e4a2e" opacity="0.6"/>

<!-- Text -->
<div id="text-block">
  <p class="tagline" id="tag">with all my love</p>
  <h1 class="headline" id="headline">For You, Kannu</h1>
  <p class="sub" id="sub">Every petal holds a thousand words I feel for you ♡</p>
</div>

<!-- Verse at bottom -->
<div id="verse">
  <p>"Like roses bloom in the gentlest light — so does my heart, always, for you."</p>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<120;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;opacity:${0.1+Math.random()*0.5}`;
  starsEl.appendChild(s);
}

// Particle canvas
const canvas=document.getElementById('particle-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

const particles=[];
let animating=false;

class Particle{
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=Math.random()*canvas.width;
    this.y=init?Math.random()*canvas.height:canvas.height+20;
    this.size=Math.random()*4+1.5;
    this.speedY=-(Math.random()*1.2+0.4);
    this.speedX=(Math.random()-0.5)*0.8;
    this.opacity=Math.random()*0.7+0.1;
    this.color=`hsl(${330+Math.random()*40},${60+Math.random()*30}%,${60+Math.random()*25}%)`;
    this.life=1;
    this.decay=Math.random()*0.003+0.001;
    // heart or circle
    this.isHeart=Math.random()>0.5;
    this.rotation=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.04;
  }
  drawHeart(x,y,size){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(this.rotation);
    ctx.scale(size/10,size/10);
    ctx.beginPath();
    ctx.moveTo(0,-3);
    ctx.bezierCurveTo(5,-8,10,-3,0,5);
    ctx.bezierCurveTo(-10,-3,-5,-8,0,-3);
    ctx.fill();
    ctx.restore();
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    this.rotation+=this.rotSpeed;
    this.life-=this.decay;
    this.speedX+=Math.sin(this.y*0.01)*0.02;
    if(this.life<=0||this.y<-20){this.reset();}
  }
  draw(){
    ctx.globalAlpha=this.opacity*this.life;
    ctx.fillStyle=this.color;
    if(this.isHeart){
      this.drawHeart(this.x,this.y,this.size*2);
    } else {
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function animate(){
  if(!animating)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  ctx.globalAlpha=1;
  requestAnimationFrame(animate);
}

// Falling petal rain
function spawnPetalRain(){
  const colors=['#e8517a','#f07898','#d63c6b','#f5c3d3','#c2304f','#fbd0e0','#ef8aaa'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='fpetal';
      const c=colors[Math.floor(Math.random()*colors.length)];
      const dur=4+Math.random()*5;
      const size=6+Math.random()*10;
      p.style.cssText=`
        left:${Math.random()*100}vw;
        top:-20px;
        width:${size}px;
        height:${size*1.4}px;
        background:${c};
        opacity:0.8;
        animation-duration:${dur}s;
        animation-delay:${Math.random()*3}s;
        border-radius:${40+Math.random()*20}% ${40+Math.random()*20}% ${30+Math.random()*20}% ${30+Math.random()*20}%;
      `;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),(dur+4)*1000);
    },i*80);
  }
}

// Bloom animation sequence
function bloomFlowers(){
  const seq=[
    ['stems',300,'opacity:1;transition:opacity 1s ease'],
    ['wrap-group',500,'opacity:1;transition:opacity 1.2s ease'],
    ['baby-breath',800,'opacity:1;transition:opacity 1s ease 0.5s'],
    ['petals-ground',900,'opacity:0.5;transition:opacity 1.5s ease'],
    ['bud1',600,'opacity:1;transform:scale(1);transition:opacity 0.8s ease 0.8s, transform 1s cubic-bezier(0.175,0.885,0.32,1.275) 0.8s'],
    ['bud2',700,'opacity:1;transform:scale(1);transition:opacity 0.8s ease 1s, transform 1s cubic-bezier(0.175,0.885,0.32,1.275) 1s'],
    ['fl-far-left',400,'opacity:1;transform:scale(1) translate(0,0);transition:opacity 1s ease 1.2s, transform 1.2s cubic-bezier(0.175,0.885,0.32,1.275) 1.2s'],
    ['fl-far-right',400,'opacity:1;transform:scale(1) translate(0,0);transition:opacity 1s ease 1.4s, transform 1.2s cubic-bezier(0.175,0.885,0.32,1.275) 1.4s'],
    ['fl-left',400,'opacity:1;transform:scale(1) translate(0,0);transition:opacity 1s ease 1.6s, transform 1.3s cubic-bezier(0.175,0.885,0.32,1.275) 1.6s'],
    ['fl-right',400,'opacity:1;transform:scale(1) translate(0,0);transition:opacity 1s ease 1.8s, transform 1.3s cubic-bezier(0.175,0.885,0.32,1.275) 1.8s'],
    ['fl-center',400,'opacity:1;transform:scale(1) translate(0,0);transition:opacity 1.2s ease 2.2s, transform 1.5s cubic-bezier(0.175,0.885,0.32,1.275) 2.2s'],
  ];
  seq.forEach(([id,_,css])=>{
    const el=document.getElementById(id);
    if(el){
      // Start from scaled down
      if(id.startsWith('fl-')||id.startsWith('bud')){
        el.style.transform='scale(0)';
      }
      // apply
      setTimeout(()=>{el.style.cssText=(el.style.cssText||'')+';'+css;},10);
    }
  });
}

function beginMagic(){
  const btn=document.getElementById('start-btn');
  btn.style.opacity='0';
  btn.style.transform='translate(-50%,-50%) scale(0.8)';
  btn.style.transition='all 0.5s ease';
  setTimeout(()=>btn.style.display='none',500);

  // Show glow ring
  document.getElementById('glow-ring').classList.add('visible');

  // Show bouquet
  const svg=document.getElementById('bouquet-svg');
  svg.classList.add('visible');

  // Start particles
  for(let i=0;i<80;i++) particles.push(new Particle());
  animating=true;
  animate();

  // Bloom
  bloomFlowers();

  // Petal rain after bloom
  setTimeout(spawnPetalRain, 2000);

  // Text
  setTimeout(()=>{
    document.getElementById('tag').classList.add('show');
    document.getElementById('headline').classList.add('show');
  },3000);
  setTimeout(()=>{
    document.getElementById('sub').classList.add('show');
  },3800);
  setTimeout(()=>{
    document.getElementById('verse').classList.add('show');
  },4500);

  // Second petal rain
  setTimeout(spawnPetalRain, 7000);
}
</script>
