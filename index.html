<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Kannu 🌸 - Heavenly Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rose: #e8517a;
  --rose-light: #f9c3d2;
  --bg-deep: #0a0206;
  --bg-mid: #1f0513;
  --bg-nebula: #3d0c24;
  --text-main: #fff0f5;
  --text-soft: #f8c4d5;
  --gold-glow: rgba(255, 215, 0, 0.3);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: var(--bg-deep);
}

body {
  /* Heavenly Nebula Background */
  background: radial-gradient(circle at 50% 120%, var(--bg-nebula) 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
  font-family: 'Lato', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 100vh;
}

/* Enhanced Starfield */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 10px #fff, 0 0 20px var(--rose-light);
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Ambient Floating Scene */
#scene {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  height: 100vh;
  justify-content: flex-end;
  padding-bottom: 0;
  animation: ethereal-float 6s ease-in-out infinite;
}
@keyframes ethereal-float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
}

/* Glowing Bouquet */
#bouquet-svg {
  display: block;
  width: min(750px, 95vw);
  max-height: 75vh;
  margin-bottom: -2px;
  opacity: 0;
  transition: opacity 1.2s ease, filter 2s ease;
  filter: drop-shadow(0 0 25px rgba(232, 81, 122, 0.3));
}
#bouquet-svg.visible { opacity: 1; }

/* Heavenly Typography */
#text-block {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding-top: 8vh;
  z-index: 5;
  pointer-events: none;
}
.tagline {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.7rem, 2vw, 1.2rem);
  letter-spacing: 0.4em;
  color: var(--rose-light);
  opacity: 0;
  transform: translateY(-15px);
  transition: all 1.5s ease 0.2s;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(249, 195, 210, 0.5);
}
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 12vw, 7rem);
  font-style: italic;
  font-weight: 600;
  color: var(--text-main);
  line-height: 1.1;
  text-align: center;
  letter-spacing: 0.01em;
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1) 0.5s, 
              transform 2s cubic-bezier(0.23, 1, 0.32, 1) 0.5s,
              letter-spacing 3s ease 0.5s;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 
               0 0 50px rgba(232, 81, 122, 0.6), 
               0 0 100px rgba(232, 81, 122, 0.3);
}
.headline.show { letter-spacing: 0.03em; }

.sub {
  margin-top: 1rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem, 3.5vw, 1.8rem);
  font-style: italic;
  font-weight: 400;
  color: var(--text-soft);
  opacity: 0;
  transform: translateY(10px);
  transition: all 1.5s ease 1.2s;
  text-align: center;
  padding: 0 1.5rem;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
.show { opacity: 1; transform: translateY(0) scale(1); }

/* Magical Start Portal (Button) */
#start-btn {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  background: rgba(232, 81, 122, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: #fff;
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.9rem, 2.5vw, 1.2rem);
  letter-spacing: 0.3em;
  padding: 1.2em 3.5em;
  border-radius: 50px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(232, 81, 122, 0.3), 
              inset 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  overflow: hidden;
}
#start-btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: conic-gradient(transparent, rgba(255,255,255,0.3), transparent 30%);
  animation: rotate-glow 4s linear infinite;
  z-index: -1;
}
@keyframes rotate-glow { 100% { transform: rotate(360deg); } }

#start-btn:hover {
  background: rgba(232, 81, 122, 0.2);
  box-shadow: 0 0 60px rgba(232, 81, 122, 0.6), 0 0 100px var(--gold-glow);
  border-color: rgba(255, 255, 255, 0.8);
  transform: translate(-50%, -50%) scale(1.08);
  letter-spacing: 0.4em;
}

/* 3D Tumbly Falling Petals */
.fpetal {
  position: fixed;
  width: 12px; height: 16px;
  border-radius: 50% 0 50% 0; /* More organic petal shape */
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  animation: fall-3d linear forwards;
  box-shadow: 0 0 10px rgba(232, 81, 122, 0.5);
}
@keyframes fall-3d {
  0% { 
    opacity: 0; 
    transform: translate3d(0, -50px, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); 
  }
  10% { opacity: 0.9; }
  90% { opacity: 0.6; }
  100% { 
    opacity: 0; 
    transform: translate3d(var(--end-x, 20vw), 110vh, 0) rotateX(720deg) rotateY(360deg) rotateZ(360deg); 
  }
}

/* Heavenly Bottom Glow Aura */
#glow-ring {
  position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(232, 81, 122, 0.3) 0%, rgba(212, 168, 67, 0.1) 40%, transparent 70%);
  pointer-events: none; z-index: 1;
  opacity: 0; transition: opacity 3s ease 0.5s;
  filter: blur(40px);
  animation: pulse-aura 6s infinite alternate;
}
#glow-ring.visible { opacity: 1; }
@keyframes pulse-aura {
  0% { transform: translateX(-50%) scale(0.9); opacity: 0.8; }
  100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
}

/* Particle Canvas Overlay */
#particle-canvas { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

/* Poetic Verse */
#verse {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center;
  padding: 1rem 1.5rem 2rem;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transform: translateY(20px);
  transition: all 2s ease 3s;
}
#verse.show { opacity: 1; transform: translateY(0); }
#verse p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: rgba(255, 230, 240, 0.8);
  letter-spacing: 0.06em;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}
</style>
</head>

      <!-- Layer 2 -->
      <path d="M0,40 Q-48,8 -38,-58 Q-10,-28 0,40" fill="#ee5680"/><path d="M0,40 Q48,8 38,-58 Q10,-28 0,40" fill="#ea527c"/>
      <path d="M0,40 Q-4,-52 -40,-60 Q-20,-28 0,40" fill="#f25d85"/><path d="M0,40 Q4,-52 40,-60 Q20,-28 0,40" fill="#f46088"/>
      <path d="M0,40 Q-34,-10 -44,-55 Q-14,-30 0,40" fill="#ef5882"/><path d="M0,40 Q34,-10 44,-55 Q14,-30 0,40" fill="#f05a84"/>
      <!-- Layer 1 -->
      <path d="M0,34 Q-35,10 -28,-45 Q-6,-22 0,34" fill="#f97da0"/><path d="M0,34 Q35,10 28,-45 Q6,-22 0,34" fill="#f7789c"/>

<!-- Heavenly Typography -->
<div id="text-block">
  <p class="tagline" id="tag">Eternally Yours</p>
  <h1 class="headline" id="headline">For You, Kannu</h1>
  <p class="sub" id="sub">Every petal holds a thousand words my soul feels for you ✧</p>
</div>

<!-- Verse at bottom -->
<div id="verse">
  <p>"Like roses blooming in celestial light, my heart unfurls, always, for you."</p>
</div>

<script>
// Heavenly Starfield
const starsEl = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width: ${sz}px; height: ${sz}px; 
    left: ${Math.random() * 100}%; top: ${Math.random() * 100}%; 
    animation-duration: ${3 + Math.random() * 5}s; 
    animation-delay: ${Math.random() * 5}s; 
    opacity: ${0.2 + Math.random() * 0.8};
  `;
  starsEl.appendChild(s);
}

// Advanced Particle Engine (Glowing Orbs & Floating Hearts)
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const particles = [];
let animating = false;

class Particle {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 20;
    this.size = Math.random() * 5 + 1;
    this.speedY = -(Math.random() * 1.5 + 0.2);
    this.speedX = (Math.random() - 0.5) * 1;
    this.life = 1;
    this.decay = Math.random() * 0.005 + 0.002;
    this.isHeart = Math.random() > 0.7;
    this.color = this.isHeart ? `hsla(${330 + Math.random() * 30}, 80%, 70%, 1)` : `hsla(0, 0%, 100%, ${Math.random() * 0.5 + 0.5})`;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.05;
  }
  drawHeart(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.rotation);
    ctx.scale(size / 15, size / 15);
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.bezierCurveTo(5, -8, 10, -3, 0, 5);
    ctx.bezierCurveTo(-10, -3, -5, -8, 0, -3);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
  update() {
    this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
    this.y += this.speedY;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < -20) this.reset();
  }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    if (this.isHeart) {
      this.drawHeart(this.x, this.y, this.size * 2.5);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#fff';
      ctx.fill();
    }
  }
}

function animate() {
  if (!animating) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'screen'; // Celestial light blending
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

// 3D Tumbly Falling Petals
function spawnPetalRain() {
  const colors = ['#e8517a', '#f07898', '#d63c6b', '#f9c3d2', '#fff'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'fpetal';
      const size = 8 + Math.random() * 12;
      const endX = (Math.random() * 200 - 100) + 'vw';
      p.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -30px;
        width: ${size}px; height: ${size * 1.3}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${5 + Math.random() * 6}s;
        animation-delay: ${Math.random() * 2}s;
        --end-x: ${endX};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 12000);
    }, i * 100);
  }
}

// Cinematic Bloom Sequence
function bloomFlowers() {
  const cubic = "cubic-bezier(0.34, 1.56, 0.64, 1)"; // Bouncy spring effect
  const seq = [
    ['stems', 0, 'opacity:1; transition:opacity 1.5s ease'],
    ['wrap-group', 300, 'opacity:1; transition:opacity 2s ease'],
    ['baby-breath', 1000, 'opacity:1; transition:opacity 2s ease'],
    ['bud1', 600, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 1.5s ${cubic}`],
    ['bud2', 800, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 1.5s ${cubic}`],
    ['fl-far-left', 1200, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 1.8s ${cubic}`],
    ['fl-far-right', 1400, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 1.8s ${cubic}`],
    ['fl-left', 1600, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 2s ${cubic}`],
    ['fl-right', 1800, `opacity:1; transform:scale(1); transition:opacity 1s ease, transform 2s ${cubic}`],
    ['fl-center', 2400, `opacity:1; transform:scale(1); transition:opacity 1.5s ease, transform 2.5s ${cubic}`],
  ];
  seq.forEach(([id, delay, css]) => {
    const el = document.getElementById(id);
    if (el) {
      if (id.startsWith('fl-') || id.startsWith('bud')) el.style.transform = 'scale(0)';
      setTimeout(() => { el.style.cssText = (el.style.cssText || '') + ';' + css; }, delay + 10);
    }
  });
}

function beginMagic() {
  const btn = document.getElementById('start-btn');
  btn.style.opacity = '0';
  btn.style.transform = 'translate(-50%, -50%) scale(1.5)';
  btn.style.filter = 'blur(10px)';
  setTimeout(() => btn.style.display = 'none', 600);

  document.getElementById('glow-ring').classList.add('visible');
  document.getElementById('bouquet-svg').classList.add('visible');

  for (let i = 0; i < 100; i++) particles.push(new Particle());
  animating = true;
  animate();

  bloomFlowers();
  setTimeout(spawnPetalRain, 2500);

  setTimeout(() => {
    document.getElementById('tag').classList.add('show');
    document.getElementById('headline').classList.add('show');
  }, 3500);
  setTimeout(() => document.getElementById('sub').classList.add('show'), 4500);
  setTimeout(() => document.getElementById('verse').classList.add('show'), 6000);
  
  // Continuous gentle petal rain
  setInterval(spawnPetalRain, 12000);
}
</script>
</body>
