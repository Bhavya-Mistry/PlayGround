<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Kannu 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --rose: #e8517a;
  --rose-dark: #c2304f;
  --rose-light: #f9c3d2;
  --petal-deep: #d63c6b;
  --petal-mid: #ef7fa0;
  --petal-light: #fbd0e0;
  --gold: #f4d068;
  --bg1: #1a0510;
  --bg2: #2d0a1b;
  --text-main: #fff0f5;
  --text-soft: #f8c4d5;
}

html, body { 
  width: 100%; 
  height: 100%; 
  overflow: hidden; 
  background-color: var(--bg1);
}

body {
  /* Heavenly shifting background */
  background: radial-gradient(ellipse at 50% 120%, rgba(232, 81, 122, 0.2) 0%, rgba(45, 10, 27, 1) 40%, #080105 100%);
  font-family: 'Lato', sans-serif;
  display: flex; 
  flex-direction: column;
  align-items: center; 
  justify-content: center;
  position: relative;
  min-height: 100vh;
}

/* Twinkling Starfield */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.4);
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.05; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

/* Main scene */
#scene {
  position: relative; 
  z-index: 2;
  display: flex; 
  flex-direction: column; 
  align-items: center;
  width: 100%; 
  height: 100vh;
  justify-content: flex-end;
}

/* SVG bouquet with floating effect & glow */
#bouquet-svg {
  display: block;
  width: min(750px, 95vw);
  max-height: 75vh;
  margin-bottom: -5vh;
  opacity: 0;
  transition: opacity 1.5s ease;
  filter: drop-shadow(0 0 35px rgba(232, 81, 122, 0.35));
}
#bouquet-svg.visible { opacity: 1; }
#bouquet-svg.float { animation: floating 6s ease-in-out infinite; }

@keyframes floating {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(1deg); }
}

/* Text overlay */
#text-block {
  position: fixed; top: 8vh; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 5; pointer-events: none;
}
.tagline {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.7rem, 2vw, 1.2rem);
  letter-spacing: 0.4em;
  color: var(--gold);
  opacity: 0;
  transform: translateY(-15px);
  transition: all 1.5s ease 0.5s;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(244, 208, 104, 0.5);
}
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 11vw, 7rem);
  font-style: italic;
  font-weight: 600;
  /* Shimmering gradient text */
  background: linear-gradient(to right, #fff, #f9c3d2, #fff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 5s linear infinite;
  line-height: 1.1;
  text-align: center;
  letter-spacing: 0.03em;
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: all 2s cubic-bezier(0.25, 1, 0.3, 1) 1s;
  filter: drop-shadow(0 4px 15px rgba(232, 81, 122, 0.6));
}
@keyframes shine {
  to { background-position: 200% center; }
}
.sub {
  margin-top: 1rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem, 3.5vw, 1.8rem);
  font-style: italic;
  color: var(--text-soft);
  opacity: 0;
  transform: translateY(15px);
  transition: all 1.5s ease 1.8s;
  text-align: center;
  padding: 0 1rem;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}
.show { opacity: 1; transform: translateY(0) scale(1); }

/* Start button - Magical Glassmorphism */
#start-btn {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  color: var(--text-main);
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.9rem, 2.5vw, 1.2rem);
  letter-spacing: 0.25em;
  padding: 1.2em 3em;
  border-radius: 50px;
  cursor: pointer;
  background: rgba(232, 81, 122, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(232, 81, 122, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
  animation: float-btn 3s ease-in-out infinite;
}
#start-btn:hover {
  background: rgba(232, 81, 122, 0.2);
  box-shadow: 0 0 50px rgba(232, 81, 122, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.6);
  transform: translate(-50%, -55%) scale(1.05);
  animation: none;
  letter-spacing: 0.3em;
}
@keyframes float-btn {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -55%); box-shadow: 0 0 45px rgba(232, 81, 122, 0.5); }
}

/* Realistic 3D Falling petals */
.fpetal {
  position: fixed;
  /* Rose petal shape */
  border-radius: 15px 0px 15px 15px; 
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  box-shadow: inset 2px 2px 4px rgba(255,255,255,0.2), 0 0 10px rgba(232,81,122,0.3);
  animation: flutter linear forwards;
}
@keyframes flutter {
  0% { 
    opacity: 0; 
    transform: translate3d(0, -20px, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); 
  }
  10% { opacity: 0.9; }
  80% { opacity: 0.9; }
  100% { 
    opacity: 0; 
    transform: translate3d(var(--drift), 110vh, 0) rotateX(720deg) rotateY(360deg) rotateZ(360deg); 
  }
}

/* Ethereal Glow ring */
#glow-ring {
  position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
  width: 80vw; height: 60vh;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(232, 81, 122, 0.25) 0%, rgba(255, 255, 255, 0.05) 40%, transparent 70%);
  pointer-events: none; z-index: 1;
  opacity: 0; transition: opacity 3s ease 1s;
  mix-blend-mode: screen;
}
#glow-ring.visible { opacity: 1; animation: pulse-glow 6s infinite alternate; }

@keyframes pulse-glow {
  0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
  100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
}

/* Particle canvas */
#particle-canvas { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

/* Verse */
#verse {
  position: fixed; bottom: 3vh; left: 0; right: 0;
  text-align: center; padding: 1rem; z-index: 6; pointer-events: none;
  opacity: 0; transition: opacity 2s ease 3.5s;
}
#verse.show { opacity: 1; }
#verse p {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  color: rgba(255, 210, 225, 0.85); letter-spacing: 0.06em;
  text-shadow: 0 2px 8px rgba(0,0,0,1);
}
</style>

      <path d="M0,34 Q-35,10 -28,-45 Q-6,-22 0,34" fill="#f97da0"/><path d="M0,34 Q35,10 28,-45 Q6,-22 0,34" fill="#f7789c"/><path d="M0,32 Q-3,-40 -28,-46 Q-14,-22 0,32" fill="#fca0b8"/><path d="M0,32 Q3,-40 28,-46 Q14,-22 0,32" fill="#fb9cb4"/><path d="M0,30 Q-20,5 -18,-36 Q-3,-16 0,30" fill="#fdb8c8"/><path d="M0,30 Q20,5 18,-36 Q3,-16 0,30" fill="#fcb4c5"/>

      <path d="M0,25 Q-12,10 -10,0 Q0,8 0,25" fill="#2c5f3a"/><path d="M0,25 Q12,10 10,0 Q0,8 0,25" fill="#3a7c4e"/><path d="M0,22 Q-20,0 -10,-25 Q2,-10 0,22" fill="#c83c68"/><path d="M0,22 Q20,0 10,-25 Q-2,-10 0,22" fill="#d03e6a"/><path d="M0,18 Q-14,2 -8,-20 Q2,-8 0,18" fill="#e04a72"/><circle cx="0" cy="-8" r="5" fill="url(#stamen-g)"/>

    <!-- Baby breath fillers -->
    <g id="baby-breath" opacity="0">

<!-- Text -->
<div id="text-block">
  <p class="tagline" id="tag">With All My Love</p>
  <h1 class="headline" id="headline">For You, Kannu</h1>
  <p class="sub" id="sub">Every petal holds a thousand words I feel for you ♡</p>
</div>

<!-- Verse -->
<div id="verse">
  <p>"Like roses bloom in the gentlest light — so does my heart, always, for you."</p>
</div>

<script>
// Twinkling Starfield
const starsEl = document.getElementById('stars');
for(let i=0; i<150; i++){
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 1;
  s.style.cssText = `
    width:${sz}px; height:${sz}px; 
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    animation-duration:${2 + Math.random()*5}s;
    animation-delay:${Math.random()*5}s;
  `;
  starsEl.appendChild(s);
}

// Glowing Particles Canvas
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const particles = [];
let animating = false;

class Particle {
  constructor() { this.reset(true); }
  reset(init=false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 20;
    this.size = Math.random() * 3 + 2;
    this.speedY = -(Math.random() * 1.5 + 0.5);
    this.speedX = (Math.random() - 0.5) * 1.5;
    this.opacity = Math.random() * 0.5 + 0.2;
    const hues = [330, 340, 350, 20]; // Pinks, magentas, soft golds
    this.color = `hsl(${hues[Math.floor(Math.random()*hues.length)]}, 80%, 70%)`;
    this.life = 1;
    this.decay = Math.random() * 0.003 + 0.001;
    this.isHeart = Math.random() > 0.6;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.03;
  }
  drawHeart(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.rotation);
    ctx.scale(size/10, size/10);
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.bezierCurveTo(5, -8, 10, -3, 0, 5);
    ctx.bezierCurveTo(-10, -3, -5, -8, 0, -3);
    ctx.fill();
    ctx.restore();
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;
    this.speedX += Math.sin(this.y * 0.01) * 0.02; // Gentle swaying
    if(this.life <= 0 || this.y < -20) this.reset();
  }
  draw() {
    ctx.globalCompositeOperation = 'lighter'; // Magical glow blend mode
    ctx.globalAlpha = this.opacity * this.life;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    
    if(this.isHeart) {
      this.drawHeart(this.x, this.y, this.size * 2);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function animate() {
  if(!animating) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

// Cinematic 3D Petal Rain
function spawnPetalRain() {
  const gradients = [
    'linear-gradient(135deg, #fbd0e0, #e8517a)',
    'linear-gradient(135deg, #f5769a, #ba1a3f)',
    'linear-gradient(135deg, #fff0f5, #ef7fa0)'
  ];
  for(let i=0; i<80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'fpetal';
      const bg = gradients[Math.floor(Math.random() * gradients.length)];
      const dur = 6 + Math.random() * 6;
      const size = 10 + Math.random() * 15;
      const drift = (Math.random() > 0.5 ? 1 : -1) * (50 + Math.random() * 150) + 'px';
      
      p.style.cssText = `
        left: ${Math.random() * 100}vw;
        width: ${size}px; height: ${size * 1.3}px;
        background: ${bg};
        animation-duration: ${dur}s;
        --drift: ${drift};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), dur * 1000);
    }, i * 90);
  }
}

// Orchestrated Bloom Animation
function bloomFlowers() {
  const seq = [
    ['stems', 0, 'opacity:1; transition:opacity 1.5s ease'],
    ['wrap-group', 300, 'opacity:1; transition:opacity 2s ease'],
    ['baby-breath', 1200, 'opacity:1; transition:opacity 2s ease'],
    ['bud1', 800, 'opacity:1; transform:scale(1); transition:opacity 1.2s ease, transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['bud2', 1000, 'opacity:1; transform:scale(1); transition:opacity 1.2s ease, transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['fl-far-left', 1300, 'opacity:1; transform:scale(1); transition:all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['fl-far-right', 1500, 'opacity:1; transform:scale(1); transition:all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['fl-left', 1800, 'opacity:1; transform:scale(1); transition:all 1.8s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['fl-right', 2100, 'opacity:1; transform:scale(1); transition:all 1.8s cubic-bezier(0.34, 1.56, 0.64, 1)'],
    ['fl-center', 2600, 'opacity:1; transform:scale(1); transition:all 2.2s cubic-bezier(0.34, 1.56, 0.64, 1)']
  ];
  
  seq.forEach(([id, delay, css]) => {
    const el = document.getElementById(id);
    if(el) {
      if(id.startsWith('fl-') || id.startsWith('bud')) el.style.transform = 'scale(0.5) translateY(20px)';
      setTimeout(() => { el.style.cssText = (el.style.cssText||'') + ';' + css; }, delay);
    }
  });

  // Add floating animation to the whole bouquet once fully bloomed
  setTimeout(() => {
    document.getElementById('bouquet-svg').classList.add('float');
  }, 4500);
}

function beginMagic() {
  const btn = document.getElementById('start-btn');
  btn.style.opacity = '0';
  btn.style.transform = 'translate(-50%, -50%) scale(1.5)';
  btn.style.pointerEvents = 'none';
  setTimeout(() => btn.remove(), 1000);

  // Trigger elements
  document.getElementById('glow-ring').classList.add('visible');
  document.getElementById('bouquet-svg').classList.add('visible');

  // Launch particle engine
  for(let i=0; i<120; i++) particles.push(new Particle());
  animating = true;
  animate();

  bloomFlowers();
  setTimeout(spawnPetalRain, 2500);

  // Show text layers sequence
  setTimeout(() => { document.getElementById('tag').classList.add('show'); }, 3000);
  setTimeout(() => { document.getElementById('headline').classList.add('show'); }, 3800);
  setTimeout(() => { document.getElementById('sub').classList.add('show'); }, 4800);
  setTimeout(() => { document.getElementById('verse').classList.add('show'); }, 6000);

  // Keep raining petals periodically
  setInterval(spawnPetalRain, 10000);
}
</script>
</body>
