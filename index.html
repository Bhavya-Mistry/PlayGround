<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Kannu 🌸</title>
  
  <!-- Importing beautiful fonts for a romantic touch -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      /* A richer, softer romantic gradient */
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .container {
      text-align: center;
      z-index: 2;
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Typography */
    h1 {
      font-family: 'Dancing Script', cursive;
      color: #fff;
      font-size: 5rem;
      text-shadow: 0 5px 15px rgba(255, 78, 131, 0.4);
      opacity: 0;
      transform: translateY(30px) scale(0.9);
      transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 20px;
      letter-spacing: 2px;
    }

    .message {
      margin-top: 10px;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1.5s ease 0.5s;
      text-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .show-text {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Button */
    .btn {
      padding: 18px 50px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.9);
      color: #ff4f81;
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(255, 79, 129, 0.3);
      transition: 0.4s ease;
      position: absolute;
      z-index: 10;
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      background: #fff;
      box-shadow: 0 20px 40px rgba(255, 79, 129, 0.4);
    }

    /* Bouquet Container */
    .bouquet {
      position: relative;
      width: 400px;
      height: 500px;
      display: none; /* Hidden until clicked */
      margin-top: -50px;
    }

    /* Wrapper/Cone */
    .wrap {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 220px;
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 5;
      border-radius: 5px;
      box-shadow: inset 0 -20px 30px rgba(0,0,0,0.1);
      opacity: 0;
      animation: fadeUp 1s ease forwards;
    }

    .wrap::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      filter: blur(5px);
    }

    /* Stems */
    .stem {
      position: absolute;
      width: 10px;
      background: linear-gradient(to top, #1e5e3a, #3cb371);
      bottom: 120px;
      z-index: 1;
      border-radius: 10px;
      transform-origin: bottom center;
      opacity: 0;
      animation: growStem 1.5s ease forwards 0.5s;
    }

    .stem.center { left: 195px; height: 260px; }
    .stem.left { left: 140px; height: 220px; transform: rotate(-15deg); }
    .stem.right { left: 250px; height: 220px; transform: rotate(15deg); }

    /* Flowers */
    .flower {
      position: absolute;
      width: 120px;
      height: 120px;
      z-index: 4;
      transform: scale(0);
      animation: bloom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .flower.center-flower { top: 30px; left: 140px; animation-delay: 1s; }
    .flower.left-flower { top: 90px; left: 50px; animation-delay: 1.3s; }
    .flower.right-flower { top: 90px; left: 230px; animation-delay: 1.6s; }

    /* Layered Petals */
    .petal {
      position: absolute;
      width: 45px;
      height: 65px;
      border-radius: 50% 50% 15% 15%;
      bottom: 20px;
      left: 37px;
      transform-origin: bottom center;
      box-shadow: 0 0 15px rgba(0,0,0,0.08);
    }

    /* Deep Pink / Red Flower (Center) */
    .center-flower .petal { background: linear-gradient(to top, #ff0844 0%, #ffb199 100%); }
    /* Soft Pink Flowers (Sides) */
    .left-flower .petal, .right-flower .petal { background: linear-gradient(to top, #ff758c 0%, #ff7eb3 100%); }

    /* Rotating the petals to form a realistic flower */
    .p1 { transform: rotate(0deg) translateY(-10px); z-index: 3; }
    .p2 { transform: rotate(45deg); z-index: 2; }
    .p3 { transform: rotate(90deg); z-index: 1; }
    .p4 { transform: rotate(135deg); z-index: 2; }
    .p5 { transform: rotate(180deg); z-index: 1; }
    .p6 { transform: rotate(225deg); z-index: 2; }
    .p7 { transform: rotate(270deg); z-index: 1; }
    .p8 { transform: rotate(315deg); z-index: 2; }

    /* Flower Centers */
    .flower-center {
      position: absolute;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, #ffe259, #ffa751);
      border-radius: 50%;
      top: 45px;
      left: 45px;
      z-index: 5;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    /* Leaves */
    .leaf {
      position: absolute;
      width: 40px;
      height: 20px;
      background: #3cb371;
      border-radius: 0 20px 0 20px;
      z-index: 2;
    }
    
    .leaf.l1 { top: 120px; left: -30px; transform: rotate(-30deg); }
    .leaf.l2 { top: 160px; left: 0px; transform: rotate(150deg); }

    /* Animations */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(50px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes growStem {
      0% { opacity: 0; height: 0; }
      100% { opacity: 1; }
    }

    @keyframes bloom {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Floating Hearts */
    .heart {
      position: absolute;
      color: #ff4f81;
      font-size: 22px;
      animation: floatUp linear infinite;
      opacity: 0.7;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      z-index: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(-100vh) scale(1.5) rotate(45deg); opacity: 0; }
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: spark 2s infinite ease-in-out;
      box-shadow: 0 0 10px #fff, 0 0 20px #fff;
    }

    @keyframes spark {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="container">
    <button class="btn" id="startBtn" onclick="createMagic()">
      Tap for a Surprise ❤️
    </button>

    <div class="bouquet" id="bouquet">
      <!-- Stems -->
      <div class="stem center"><div class="leaf l1"></div><div class="leaf l2"></div></div>
      <div class="stem left"></div>
      <div class="stem right"></div>

      <!-- Wrapper -->
      <div class="wrap"></div>

      <!-- Center Flower -->
      <div class="flower center-flower">
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal p5"></div><div class="petal p6"></div>
        <div class="petal p7"></div><div class="petal p8"></div>
        <div class="flower-center"></div>
      </div>

      <!-- Left Flower -->
      <div class="flower left-flower">
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal p5"></div><div class="petal p6"></div>
        <div class="petal p7"></div><div class="petal p8"></div>
        <div class="flower-center"></div>
      </div>

      <!-- Right Flower -->
      <div class="flower right-flower">
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal p5"></div><div class="petal p6"></div>
        <div class="petal p7"></div><div class="petal p8"></div>
        <div class="flower-center"></div>
      </div>
    </div>

    <!-- Personalized Text -->
    <h1 id="text">For You, Kannu 🌸</h1>
    <div class="message" id="msg">
      Every flower here blooms only for you ❤️
    </div>
  </div>

  <script>
    function createMagic() {
      // Hide button
      const btn = document.getElementById("startBtn");
      btn.style.opacity = "0";
      setTimeout(() => btn.style.display = "none", 400);

      // Show bouquet
      const bouquet = document.getElementById("bouquet");
      bouquet.style.display = "block";

      // Show text after flowers bloom
      setTimeout(() => {
        document.getElementById("text").classList.add("show-text");
        document.getElementById("msg").classList.add("show-text");
      }, 2500);

      // Generate floating hearts
      for(let i = 0; i < 35; i++) {
        setTimeout(() => {
          let heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML = "❤";
          
          // Randomize position, size, and duration
          heart.style.left = Math.random() * 100 + "vw";
          heart.style.top = (80 + Math.random() * 20) + "vh";
          heart.style.fontSize = (15 + Math.random() * 20) + "px";
          heart.style.animationDuration = (4 + Math.random() * 4) + "s";
          
          document.body.appendChild(heart);
          
          // Clean up hearts
          setTimeout(() => { heart.remove(); }, 8000);
        }, i * 150); // Stagger the hearts spawning
      }

      // Generate background sparkles
      for(let i = 0; i < 40; i++) {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = Math.random() * 100 + "vh";
        sparkle.style.animationDelay = Math.random() * 3 + "s";
        document.body.appendChild(sparkle);
      }
    }
  </script>

</body>
</html>
